<!DOCTYPE html>
<html>
<head>
    <title>AI Translator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        body.light {
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        body.dark {
            background: #1e1e1e;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 420px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        body.dark .container {
            background: #2b2b2b;
            color: white;
        }

        h2 {
            text-align: center;
        }

        textarea, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        select {
            border: 1px solid #ccc;
        }

        button {
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .toggle-btn {
            background: #444;
            margin-bottom: 10px;
        }

       .result {
    margin-top: 25px;
    padding: 15px;
    background: #f3f4f6;
    border-radius: 8px;
}

body.dark .result {
    background: #3a3a3a;
}

.result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.copy-btn {
    background: #28a745;
    font-size: 12px;
    padding: 6px 12px;
    width: auto;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

        .loader {
            display: none;
            text-align: center;
            margin-top: 10px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body class="light">

<div class="container">

    <button class="toggle-btn" onclick="toggleMode()">🌙 Toggle Dark/Light</button>

    <h2>🌍 AI Translator</h2>

    <form method="POST" onsubmit="showLoader()">
        <textarea name="text" rows="4" placeholder="Enter text"></textarea>

        <select name="language">
            <option value="hi">Hindi</option>
            <option value="mr">Marathi</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
            <option value="ja">Japanese</option>
        </select>

        <button type="submit">Translate</button>
    </form>

    <div class="loader" id="loader">
        <div class="spinner"></div>
        <p>Translating...</p>
    </div>

  <div class="result">
    <div class="result-header">
        <strong>Translated Text:</strong>
        <button class="copy-btn" onclick="copyText()">Copy</button>
    </div>
    <p id="translated">{{ translated_text }}</p>
</div>
<script>
    function toggleMode() {
        document.body.classList.toggle("dark");
        document.body.classList.toggle("light");
    }

    function copyText() {
        const text = document.getElementById("translated").innerText;
        navigator.clipboard.writeText(text);
        alert("Copied to clipboard!");
    }

    function showLoader() {
        document.getElementById("loader").style.display = "block";
    }
</script>

</body>
</html>
